# =============================================================================
# Alembic Configuration File
# Miami Rental Platform
# =============================================================================

[alembic]
# Path to migration scripts
# Use a forward slash (/) as the path separator, even on Windows
script_location = alembic

# Template used to generate migration file names
# Uncomment the following line to customize file naming
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path prepending
# Set to the current directory to enable model imports
prepend_sys_path = .

# Timezone for version creation (default: local timezone)
# timezone = UTC

# Maximum length for the autogenerate message
# truncate_slug_length = 40

# Set to 'true' for all revision operations requiring connectivity
# revision_environment = false

# Set to 'true' to require an explicit --message when creating revisions
# sourceless = false

# Version path separator; defaults to os.pathsep
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space

# Set to 'true' to search source files recursively in each "version_locations" directory
# recursive_version_locations = false

# The output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# SQLAlchemy connection URL
# This is overridden by env.py to use the DATABASE_URL environment variable
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Post-write hooks for formatting migration files
# Uncomment to use black for formatting
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Uncomment to use ruff for formatting
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# =============================================================================
# Logging Configuration
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
